# ─────────────────────────────────────────────────────────────────
# Deploy — TEST environment
#
# Trigger : push to `test` branch  OR  manual dispatch
# Target  : Azure Storage Account (static website) — test
#           + Azure CDN purge so testers always see latest build
# ─────────────────────────────────────────────────────────────────
name: Deploy — TEST

on:
  push:
    branches: [test]
  workflow_dispatch:   # allow manual promotion from GitHub UI

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to TEST
    runs-on: ubuntu-latest
    environment: test              # GitHub Environment (no approval gate by default;
                                   # you can add required reviewers in repo Settings)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export → out/)
        run: npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Azure Blob Storage (TEST)
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_TEST }} \
            --auth-mode login \
            --source out/ \
            --destination '$web' \
            --overwrite true

      - name: Print TEST URL
        run: |
          echo "✅ Deployed to TEST:"
          echo "https://${{ secrets.AZURE_STORAGE_ACCOUNT_TEST }}.z13.web.core.windows.net/"
          echo "(if the URL above returns 404, check the zone number in your Azure Portal → Storage account → Static website)"

      - name: Azure Logout
        if: always()
        run: az logout
