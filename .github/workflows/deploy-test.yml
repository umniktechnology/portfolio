# ─────────────────────────────────────────────────────────────────
# Deploy — TEST environment
#
# Trigger : push to `test` branch  OR  manual dispatch
# Target  : Azure Static Web Apps — test
# ─────────────────────────────────────────────────────────────────
name: Deploy — TEST

on:
  push:
    branches: [test]
  workflow_dispatch:   # allow manual promotion from GitHub UI

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to TEST
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export → out/)
        run: npm run build

      - name: Deploy to Azure Static Web Apps (TEST)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "out"
          skip_app_build: true
