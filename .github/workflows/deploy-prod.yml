# ─────────────────────────────────────────────────────────────────
# Deploy — PRODUCTION environment
#
# Trigger : push to `main`  OR  manual dispatch
# Target  : Azure Static Web Apps — prod
#
# 🔒 PROTECTED: GitHub Environment "production" requires a manual
#    reviewer approval before this job runs.
#    Set this up at: Settings → Environments → production
#    → Required reviewers → add yourself
# ─────────────────────────────────────────────────────────────────
name: Deploy — PRODUCTION

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to PRODUCTION
    runs-on: ubuntu-latest
    environment: production        # ← approval gate lives here

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Deploy to Azure Static Web Apps (PROD)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "out"
          app_build_command: "npm ci && npm run build"
