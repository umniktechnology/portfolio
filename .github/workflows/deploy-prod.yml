# ─────────────────────────────────────────────────────────────────
# Deploy — PRODUCTION environment
#
# Trigger : push to `main`  OR  manual dispatch
# Target  : Azure Storage Account (static website) — prod
#           + Azure CDN Standard Microsoft (HTTPS, global edge)
#
# 🔒 PROTECTED: GitHub Environment "production" requires a manual
#    reviewer approval before this job runs.
#    Set this up at: Settings → Environments → production
#    → Required reviewers → add yourself
# ─────────────────────────────────────────────────────────────────
name: Deploy — PRODUCTION

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to PRODUCTION
    runs-on: ubuntu-latest
    environment: production        # ← approval gate lives here

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (static export → out/)
        run: npm run build

      - name: Confirm build artefact
        run: |
          echo "📦 Files to deploy:"
          find out/ -type f | wc -l
          echo "files"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Wipe old files first, then upload fresh build ─────────────
      # This prevents stale files from old builds lingering in storage
      - name: Clear old blobs (PROD)
        run: |
          az storage blob delete-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_PROD }} \
            --auth-mode login \
            --source '$web'

      - name: Upload to Azure Blob Storage (PROD)
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_PROD }} \
            --auth-mode login \
            --source out/ \
            --destination '$web' \
            --overwrite true

      # ── Purge CDN edge cache so users get the new version ─────────
      - name: Purge Azure CDN cache (PROD)
        run: |
          az cdn endpoint purge \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --profile-name ${{ secrets.AZURE_CDN_PROFILE_NAME }} \
            --name ${{ secrets.AZURE_CDN_ENDPOINT_PROD }} \
            --content-paths "/*"

      - name: Print PROD URL
        run: |
          echo "🚀 Live at:"
          az cdn endpoint show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --profile-name ${{ secrets.AZURE_CDN_PROFILE_NAME }} \
            --name ${{ secrets.AZURE_CDN_ENDPOINT_PROD }} \
            --query "hostName" \
            --output tsv | awk '{print "https://" $0}'

      - name: Azure Logout
        if: always()
        run: az logout
