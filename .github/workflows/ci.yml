# ─────────────────────────────────────────────────────────────────
# CI — Pull Request build & lint check
# Runs on every PR targeting dev, test, or main.
# Nothing is deployed; this is a quality gate only.
# ─────────────────────────────────────────────────────────────────
name: CI — Build Check

on:
  pull_request:
    branches: [dev, test, main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Confirm static output exists
        run: test -d out && echo "✅ Static output generated" || (echo "❌ Missing out/ directory" && exit 1)
