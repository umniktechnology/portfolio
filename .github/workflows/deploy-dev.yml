# ─────────────────────────────────────────────────────────────────
# Deploy — DEV environment
#
# Trigger : every push to the `dev` branch
# Target  : Azure Storage Account (static website) — dev
# Access  : direct storage URL only (no CDN needed for dev)
# ─────────────────────────────────────────────────────────────────
name: Deploy — DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy to DEV
    runs-on: ubuntu-latest
    environment: development       # GitHub Environment (no approval gate)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export → out/)
        run: npm run build

      # ── Azure login using a Service Principal stored as a secret ──
      # Secret AZURE_CREDENTIALS must be a JSON object:
      # { "clientId": "...", "clientSecret": "...",
      #   "subscriptionId": "...", "tenantId": "..." }
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Upload static files to the $web container ─────────────────
      # Secret AZURE_STORAGE_ACCOUNT_DEV = storage account name (not key)
      # RBAC role "Storage Blob Data Contributor" must be assigned to the SP
      - name: Upload to Azure Blob Storage (DEV)
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_DEV }} \
            --auth-mode login \
            --source out/ \
            --destination '$web' \
            --overwrite true

      - name: Print DEV URL
        run: |
          echo "✅ Deployed to DEV:"
          az storage account show \
            --name ${{ secrets.AZURE_STORAGE_ACCOUNT_DEV }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "primaryEndpoints.web" \
            --output tsv

      - name: Azure Logout
        if: always()
        run: az logout
