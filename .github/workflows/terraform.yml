# ─────────────────────────────────────────────────────────────────────────────
# Terraform CI/CD
#
# On Pull Request  → terraform fmt check + validate + plan (plan posted as PR comment)
# On push to main  → terraform apply (auto-approve)
# Manual dispatch  → choose plan or apply
#
# Authentication uses GitHub OIDC → no static Azure credentials stored as secrets.
# Required GitHub secrets:
#   ARM_CLIENT_ID       — App Registration client ID
#   ARM_SUBSCRIPTION_ID — Azure subscription ID
#   ARM_TENANT_ID       — Azure tenant ID
#
# One-time Azure setup for OIDC:
#   az ad app federated-credential create --id <APP_ID> --parameters '{
#     "name": "github-actions-main",
#     "issuer": "https://token.actions.githubusercontent.com",
#     "subject": "repo:YOUR_ORG/portfolio:ref:refs/heads/main",
#     "audiences": ["api://AzureADTokenExchange"]
#   }'
# ─────────────────────────────────────────────────────────────────────────────
name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write      # required for OIDC
  contents: read
  pull-requests: write # required to post plan as PR comment

env:
  TF_VERSION: '1.8.5'
  WORKING_DIR: infra
  ARM_USE_OIDC: 'true'
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  # Terraform variables — stored as GitHub secrets, not in terraform.tfvars
  TF_VAR_sp_object_id: ${{ secrets.TF_VAR_SP_OBJECT_ID }}

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || (github.event.inputs.action || 'Apply') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── OIDC login ─────────────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      # ── terraform init ─────────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── Format check ───────────────────────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      # ── Validate ───────────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Plan ───────────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      # ── Post plan as PR comment ────────────────────────────────────────────
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `## 🔍 Terraform Plan

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            > Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\``;

            // Delete previous plan comments to keep PR clean
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body.includes('## 🔍 Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── Apply (main branch push or manual apply) ───────────────────────────
      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan

      # ── Destroy (manual only — never auto) ─────────────────────────────────
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -input=false \
            -auto-approve

      - name: Azure Logout
        if: always()
        run: az logout
